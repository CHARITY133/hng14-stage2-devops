version: "3.9"

services:
  redis:
    image: redis:7
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.5
    volumes:
      - redis_data:/data
    networks:
      - backend

  api:
    build: .
    restart: always
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 512m
    cpus: 0.5
    networks:
      - backend
    ports:
      - "8000:8000"

  worker:
    build: ./worker
    restart: always
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 512m
    cpus: 0.5
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  redis_data: